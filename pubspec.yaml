name: aqua_sense
description: IoT Water Level Monitoring App
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  firebase_database: ^11.1.4      # Realtime Database (same as web app)
  firebase_messaging: ^15.1.4

  # UI & Charts
  fl_chart: ^0.69.0
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # Map
  flutter_map: ^7.0.2             # Leaflet equivalent for Flutter

  # Utils
  intl: ^0.19.0
  timeago: ^3.6.1
  url_launcher: ^6.3.0
  google_sign_in: ^7.2.0
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true