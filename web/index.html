<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AquaSense — Smart Water Monitoring Morocco</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💧</text></svg>"/>
  <link rel="stylesheet" href="styles.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
</head>
<body>

  <!-- Root mount point — shell + all pages are injected here -->
  <div id="root"></div>

  <!-- External libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Bootstrap loader (ES module) -->
  <script type="module">
    import { initApp, App, MOROCCO_CITIES, loadWeather } from './app.js';

    // ── Page conponents to load in order ──────────────────────
    const PAGES = [
      'conponents/shell.html',
      'conponents/page-dashboard.html',
      'conponents/page-map.html',
      'conponents/page-wells.html',
      'conponents/page-alerts.html',
      'conponents/page-predictions.html',
      'conponents/page-weather.html',
      'conponents/page-history.html',
      'conponents/page-firebase.html',
      'conponents/page-settings.html',
    ];

    // ── Load all conponents then boot the app ─────────────────
    async function loadconponents() {
      // Load shell first into #root
      const shellRes  = await fetch('conponents/shell.html');
      const shellHtml = await shellRes.text();
      document.getElementById('root').innerHTML = shellHtml;

      // Load all pages into #pages-container
      const pagesContainer = document.getElementById('pages-container');
      const pageFiles = PAGES.slice(1); // skip shell.html
      for (const file of pageFiles) {
        const res  = await fetch(file);
        const html = await res.text();
        pagesContainer.insertAdjacentHTML('beforeend', html);
      }
    }

    // ── Boot sequence ────────────────────────────────────────
    async function boot() {
      await loadconponents();

      // Start the app
      initApp();

      // Build city chips for weather page
      const chipsContainer = document.getElementById('city-chips');
      if (chipsContainer) {
        MOROCCO_CITIES.forEach(city => {
          const chip = document.createElement('div');
          chip.className    = 'city-chip';
          chip.dataset.city = city.name;
          chip.textContent  = city.name;
          chip.onclick      = () => loadWeather(city);
          chipsContainer.appendChild(chip);
        });
        loadWeather(MOROCCO_CITIES[0]);
        chipsContainer.firstChild.classList.add('active');
      }

      // City search
      window.searchCity = function() {
        const input = document.getElementById('city-input').value.trim();
        if (!input) return;
        const found = MOROCCO_CITIES.find(c => c.name.toLowerCase().includes(input.toLowerCase()));
        if (found) {
          loadWeather(found);
        } else {
          window.toast('w', `City "${input}" not in preset list — using Casablanca data`);
          loadWeather(MOROCCO_CITIES[0]);
        }
      };

      // Region filter for city chips
      window.filterCitiesByRegion = function(region) {
        document.querySelectorAll('.city-chip').forEach(c => {
          const city = MOROCCO_CITIES.find(x => x.name === c.dataset.city);
          c.style.display = (!region || city?.region === region) ? '' : 'none';
        });
      };

      // Clock in topbar
      setInterval(() => {
        const el = document.getElementById('last-ts');
        if (el) el.textContent = new Date().toLocaleTimeString();
      }, 1000);
    }

    boot();
  </script>

</body>
</html>
