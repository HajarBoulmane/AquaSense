<!-- ============================================================
     shell.html — App shell: sidebar, topbar, modals
     Loaded by index.html via fetch + innerHTML
     ============================================================ -->

<!-- TOASTS -->
<div id="toasts"></div>

<!-- OVERLAY (closes sidebar on mobile) -->
<div id="overlay" onclick="closeSidebar()"></div>

<!-- SENSOR DETAIL MODAL -->
<div id="sensor-modal" class="modal-overlay">
  <div class="modal-box">
    <button class="modal-close" onclick="App.closeModal()">✕</button>
    <div id="modal-body"></div>
  </div>
</div>

<!-- NOTIFICATION PANEL -->
<div id="notif-panel" class="notif-panel">
  <div class="notif-hd">
    <h3>Notifications</h3>
    <span class="notif-clear" onclick="App.clearNotifs()">Clear all</span>
  </div>
  <div id="notif-items"><div class="empty" style="padding:18px">✅ All clear</div></div>
</div>

<!-- APP SHELL -->
<div id="app-shell">

  <!-- ═══════════════ SIDEBAR ═══════════════ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">💧</div>
      <div class="logo-text-wrap">
        <div class="logo-text">Aqua<span>Sense</span></div>
        <div class="logo-badge" id="mode-badge">🔥 LIVE</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-group-label" data-i18n="monitoring">Monitoring</div>
      <div class="nav-item active" id="nav-dashboard" onclick="App.nav('dashboard',this)"><span class="nav-icon">📊</span><span class="nav-label" data-i18n="dashboard">Dashboard</span></div>
      <div class="nav-item" id="nav-map"        onclick="App.nav('map',this)">        <span class="nav-icon">🗺️</span><span class="nav-label" data-i18n="map">Map View</span></div>
      <div class="nav-item" id="nav-wells"      onclick="App.nav('wells',this)">      <span class="nav-icon">🪣</span><span class="nav-label" data-i18n="wells">Wells &amp; Tanks</span></div>
      <div class="nav-group-label" data-i18n="intelligence">Intelligence</div>
      <div class="nav-item" id="nav-alerts"     onclick="App.nav('alerts',this)">     <span class="nav-icon">🔔</span><span class="nav-label" data-i18n="alerts">Alerts</span><span class="nav-badge" id="nav-alert-count" style="display:none">0</span></div>
      <div class="nav-item" id="nav-predictions" onclick="App.nav('predictions',this)"><span class="nav-icon">🤖</span><span class="nav-label" data-i18n="predictions">AI Predictions</span></div>
      <div class="nav-item" id="nav-weather"    onclick="App.nav('weather',this)">    <span class="nav-icon">🌦️</span><span class="nav-label" data-i18n="weather">Weather</span></div>
      <div class="nav-group-label" data-i18n="dataLabel">Data</div>
      <div class="nav-item" id="nav-history"    onclick="App.nav('history',this)">    <span class="nav-icon">📈</span><span class="nav-label" data-i18n="history">History</span></div>
      <div class="nav-item" id="nav-firebase"   onclick="App.nav('firebase',this)">   <span class="nav-icon">🔥</span><span class="nav-label">Firebase</span></div>
      <div class="nav-item" id="nav-settings"   onclick="App.nav('settings',this)">   <span class="nav-icon">⚙️</span><span class="nav-label" data-i18n="settings">Settings</span></div>
    </nav>
    <div class="sidebar-footer">
      <div class="conn-card">
        <div class="conn-dot" id="conn-dot"></div>
        <div class="conn-info"><p id="conn-label">Connecting…</p><span id="conn-sub">Firebase RTDB</span></div>
      </div>
      <select class="lang-select" id="lang-select" onchange="App.changeLang(this.value)">
        <option value="en">🇬🇧 English</option>
        <option value="fr">🇫🇷 Français</option>
        <option value="ar">🇲🇦 العربية</option>
      </select>
    </div>
  </aside>

  <!-- ═══════════════ MAIN ═══════════════ -->
  <div class="main">

    <!-- TOPBAR -->
    <header class="topbar">
      <div class="topbar-left">
        <span class="hamburger" onclick="toggleSidebar()">☰</span>
        <div class="topbar-title">
          <h1 id="page-title">Dashboard</h1>
          <p>AquaSense Morocco · <span id="last-ts">—</span></p>
        </div>
      </div>
      <div class="topbar-right">
        <div class="live-pill" id="live-chip"><div class="pill-dot"></div><span id="live-chip-text">Connecting…</span></div>
        <div class="icon-btn" onclick="App.toggleNotif()">🔔<div class="notif-pip" id="notif-pip" style="display:none"></div></div>
        <div class="icon-btn" onclick="location.reload()" title="Refresh">🔄</div>
      </div>
    </header>

    <!-- PAGES ARE INJECTED HERE BY index.html loader -->
    <div id="pages-container"></div>

  </div><!-- /main -->
</div><!-- /app-shell -->
