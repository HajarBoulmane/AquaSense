<!-- PAGE: MAP VIEW -->
<div class="page" id="page-map">
  <div class="card mb">
    <div class="card-hd">
      <span class="card-title">🗺️ Live Sensor Map — Morocco (OpenStreetMap)</span>
      <span class="live-tag">● LIVE MARKERS</span>
    </div>
    <div id="leaflet-map"></div>
    <p style="font-size:11px;color:var(--muted);margin-top:10px">
      💡 Click any 💧 marker to see sensor details. Map shows all monitored wells and reservoirs across Morocco.
    </p>
  </div>
  <div class="stats-grid">
    <div class="stat-card blue">  <div class="stat-label">📡 Online</div>        <div class="stat-val blue"   id="map-online">—</div></div>
    <div class="stat-card warn">  <div class="stat-label">⚡ Offline</div>       <div class="stat-val warn"   id="map-offline">—</div></div>
    <div class="stat-card danger"><div class="stat-label">🚨 Critical</div>      <div class="stat-val danger" id="map-critical">—</div></div>
    <div class="stat-card blue">  <div class="stat-label">🌍 Total Sensors</div> <div class="stat-val blue"   id="map-total">—</div></div>
  </div>
</div>
